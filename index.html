<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yunisha Chaudhary | Portfolio</title>

<style>
body{
  margin:0;
    font-family:Arial, sans-serif;
      scroll-behavior:smooth;
        background:#f3f0ff;
        }

        nav{
          background:#7c5cbf;
            padding:15px;
              position:fixed;
                width:100%;
                  top:0;
                    text-align:center;
                      z-index:1000;
                      }

                      nav a{
                        color:white;
                          margin:0 15px;
                            text-decoration:none;
                              font-weight:bold;
                              }

                              nav a:hover{
                                text-decoration:underline;
                                }

                                section{
                                  padding:100px 20px;
                                    text-align:center;
                                    }

                                    .hero{
                                      background:linear-gradient(135deg,#7c5cbf,#a855c8);
                                        color:white;
                                          padding-top:120px;
                                          }

                                          /* Profile Photo */
                                          .profile-pic{
                                            width:160px;
                                              height:160px;
                                                border-radius:50%;
                                                  object-fit:cover;
                                                    border:5px solid white;
                                                      box-shadow:0 10px 25px rgba(0,0,0,0.3);
                                                        animation:float 3s ease-in-out infinite;
                                                          margin-bottom:20px;
                                                          }

                                                          @keyframes float{
                                                            0%{transform:translateY(0);}
                                                              50%{transform:translateY(-10px);}
                                                                100%{transform:translateY(0);}
                                                                }

                                                                .card{
                                                                  background:white;
                                                                    padding:20px;
                                                                      margin:20px auto;
                                                                        max-width:500px;
                                                                          border-radius:10px;
                                                                            box-shadow:0 5px 15px rgba(0,0,0,0.1);
                                                                              opacity:0;
                                                                                transform:translateY(30px);
                                                                                  transition:0.6s;
                                                                                  }

                                                                                  .card.show{
                                                                                    opacity:1;
                                                                                      transform:translateY(0);
                                                                                      }

                                                                                      button{
                                                                                        padding:10px 20px;
                                                                                          background:#7c5cbf;
                                                                                            color:white;
                                                                                              border:none;
                                                                                                border-radius:5px;
                                                                                                  cursor:pointer;
                                                                                                  }

                                                                                                  button:hover{
                                                                                                    background:#5a3ca3;
                                                                                                    }

                                                                                                    footer{
                                                                                                      background:#eee;
                                                                                                        padding:15px;
                                                                                                        }
                                                                                                        </style>
                                                                                                        </head>

                                                                                                        <body>

                                                                                                        <nav>
                                                                                                          <a href="#home">Home</a>
                                                                                                            <a href="#about">About</a>
                                                                                                              <a href="#project">Project</a>
                                                                                                                <a href="#contact">Contact</a>
                                                                                                                </nav>

                                                                                                                <section class="hero" id="home">

                                                                                                                  <!-- 👇 Replace photo.jpg with your image file -->
                                                                                                                    <img src="https://photos.app.goo.gl/ftUuFAaZA45Jtt7VA" class="profile-pic" alt="Yunisha">

                                                                                                                      <h1>Yunisha Chaudhary</h1>
                                                                                                                        <h3><span id="typing"></span></h3>
                                                                                                                        </section>

                                                                                                                        <section id="about">
                                                                                                                          <div class="card">
                                                                                                                              <h2>About Me</h2>
                                                                                                                                  <p>I am a Grade 12 science student passionate about coding and becoming a computer engineer.</p>
                                                                                                                                    </div>
                                                                                                                                    </section>

                                                                                                                                    <section id="project">
                                                                                                                                      <div class="card">
                                                                                                                                          <h2>My Project</h2>
                                                                                                                                              <p>Simple Calculator App built using C++.</p>
                                                                                                                                                </div>
                                                                                                                                                </section>

                                                                                                                                                <section id="contact">
                                                                                                                                                  <div class="card">
                                                                                                                                                      <h2>Contact Me</h2>
                                                                                                                                                          <p>Email: yunisha@example.com</p>
                                                                                                                                                              <button onclick="alert('Thank you for visiting! 😊')">Say Hello</button>
                                                                                                                                                                </div>
                                                                                                                                                                </section>

                                                                                                                                                                <footer>
                                                                                                                                                                  © 2025 Yunisha Chaudhary
                                                                                                                                                                  </footer>

                                                                                                                                                                  <script>
                                                                                                                                                                  // Typing Effect
                                                                                                                                                                  const text = "Aspiring Computer Engineer | Passionate Coder";
                                                                                                                                                                  let i = 0;
                                                                                                                                                                  function type(){
                                                                                                                                                                    if(i < text.length){
                                                                                                                                                                        document.getElementById("typing").innerHTML += text.charAt(i);
                                                                                                                                                                            i++;
                                                                                                                                                                                setTimeout(type,50);
                                                                                                                                                                                  }
                                                                                                                                                                                  }
                                                                                                                                                                                  type();

                                                                                                                                                                                  // Scroll Animation
                                                                                                                                                                                  window.addEventListener("scroll",()=>{
                                                                                                                                                                                    document.querySelectorAll(".card").forEach(card=>{
                                                                                                                                                                                        const position = card.getBoundingClientRect().top;
                                                                                                                                                                                            const screen = window.innerHeight;
                                                                                                                                                                                                if(position < screen - 100){
                                                                                                                                                                                                      card.classList.add("show");
                                                                                                                                                                                                          }
                                                                                                                                                                                                            });
                                                                                                                                                                                                            });
                                                                                                                                                                                                            </script>

                                                                                                                                                                                                            </body>
                                                                                                                                                                                                            </html>p
